apiVersion: apps/v1
kind: Deployment
metadata:
  name: meals
  namespace: homelab
  labels:
    app: meals
    app.kubernetes.io/name: meals
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meals
  strategy:
    type: Recreate  # SQLite doesn't support multiple writers
  template:
    metadata:
      labels:
        app: meals
    spec:
      containers:
        - name: meals
          image: meals:latest
          imagePullPolicy: Never  # Using locally built image
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "file:/app/data/recipes.db"
            - name: LLM_PROVIDER
              value: "claude"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: meals-secrets
                  key: ANTHROPIC_API_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: meals-data
